<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账号服务</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #1f2937;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        background:
          radial-gradient(circle at 18% 12%, rgba(50, 196, 255, 0.18), transparent 28%),
          radial-gradient(circle at 82% 16%, rgba(40, 103, 255, 0.14), transparent 28%),
          linear-gradient(135deg, #f8fcff 0%, #eaf5ff 100%);
      }

      .card {
        width: min(100%, 430px);
        padding: 42px 36px 34px;
        border: 1px solid rgba(255, 255, 255, 0.86);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 28px 72px rgba(40, 103, 255, 0.14);
        backdrop-filter: blur(22px);
      }

      h1 {
        margin: 0 0 10px;
        text-align: center;
        font-size: 28px;
      }

      p {
        margin: 0 0 28px;
        color: #64748b;
        text-align: center;
        line-height: 1.7;
      }

      form {
        display: grid;
        gap: 14px;
      }

      input {
        height: 52px;
        width: 100%;
        padding: 0 15px;
        border: 1px solid rgba(214, 222, 234, 0.9);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.9);
        color: #1f2937;
        font: inherit;
        outline: none;
      }

      input:focus {
        border-color: #2867ff;
        box-shadow: 0 0 0 4px rgba(40, 103, 255, 0.1);
      }

      .code-row {
        display: grid;
        grid-template-columns: 1fr 108px;
        gap: 10px;
      }

      button,
      a {
        height: 50px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
      }

      button {
        border: 0;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, #2867ff, #32c4ff);
        box-shadow: 0 16px 30px rgba(40, 103, 255, 0.22);
      }

      .code-row button {
        color: #2867ff;
        background: rgba(47, 109, 255, 0.1);
        box-shadow: none;
      }

      a {
        margin-top: 12px;
        color: #51617f;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(216, 231, 248, 0.92);
      }

      .feedback {
        min-height: 22px;
        margin: 6px 0 0;
        color: #2867ff;
        text-align: center;
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 id="title">账号注册</h1>
      <p id="copy">创建企业管理员账号，进入智能客服云平台。</p>
      <form id="account-form">
        <input id="account" type="text" placeholder="请输入手机号 / 邮箱" autocomplete="username" />
        <div class="code-row">
          <input id="code" type="text" placeholder="验证码" autocomplete="one-time-code" />
          <button type="button" id="send-code">获取验证码</button>
        </div>
        <input id="password" type="password" placeholder="设置新密码" autocomplete="new-password" />
        <button type="submit" id="submit-btn">完成注册</button>
      </form>
      <div class="feedback" id="feedback"></div>
      <a href="./index.html">返回登录</a>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode") === "forgot" ? "forgot" : "register";
      const presetAccount = params.get("account") || "";
      const title = document.querySelector("#title");
      const copy = document.querySelector("#copy");
      const submit = document.querySelector("#submit-btn");
      const account = document.querySelector("#account");
      const feedback = document.querySelector("#feedback");

      account.value = presetAccount;
      if (mode === "forgot") {
        title.textContent = "找回密码";
        copy.textContent = "通过验证码验证身份后，重置登录密码。";
        submit.textContent = "重置密码";
      }

      document.querySelector("#send-code").addEventListener("click", () => {
        feedback.textContent = "验证码已发送，演示验证码为 123456。";
      });

      document.querySelector("#account-form").addEventListener("submit", (event) => {
        event.preventDefault();
        feedback.textContent = mode === "forgot" ? "密码已重置，正在返回登录..." : "账号已创建，正在返回登录...";
        window.setTimeout(() => {
          window.location.href = "./index.html";
        }, 900);
      });
    </script>
  </body>
</html>
