<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客服云平台 - 开屏动效</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            overflow: hidden;
            background-color: #0a0f1d; /* 改为深色背景 */
        }

        /* 移除了模拟主工作台相关的样式 */

        /* ================= 开屏动效层 ================= */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* 深邃科技感背景：深蓝到深紫的流体渐变 */
            background: linear-gradient(-45deg, #05080f, #12182b, #09131e, #000a12);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* 背景渐变动画 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 开屏淡出类 */
        .splash-screen.fade-out {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        /* Logo 容器 */
        .logo-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            z-index: 2;
        }

        /* Logo SVG 样式 */
        .brand-logo {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 0 rgba(255,255,255,0));
            transition: filter 1s ease-in-out;
        }

        /* 线条描绘动画相关的 Path */
        .logo-path {
            stroke: #00f0ff; /* 科技青/蓝色线条 */
            stroke-width: 4px;
            fill: transparent;
            /* JS 会动态覆盖这两个变量 */
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            /* 1. 画线动画, 2. 填充白色动画 */
            animation: 
                drawPath 2s cubic-bezier(0.45, 0.05, 0.22, 0.95) forwards,
                fillWhite 1s ease-in-out 1.8s forwards;
        }

        /* 能量波纹效果（激活感） */
        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,240,255,0.4) 0%, rgba(0,240,255,0) 70%);
            opacity: 0;
            z-index: 1;
            animation: rippleEffect 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) 1.8s forwards;
        }

        /* 标语文字层 */
        .slogan-container {
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .title {
            color: #ffffff;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) 2.2s forwards;
        }

        .subtitle {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 6px;
            opacity: 0;
            transform: translateY(20px);
            /* 科技感渐变文字 */
            background: linear-gradient(90deg, #00f0ff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) 2.4s forwards;
        }

        /* ================= 关键帧动画 ================= */
        
        /* 1. 画线动画：从全偏移到零偏移 */
        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }

        /* 2. 填充动画：线条变为透明，内部填满白色 */
        @keyframes fillWhite {
            0% {
                fill: transparent;
                stroke: #00f0ff;
            }
            100% {
                fill: #ffffff; /* 保持白色填充，在深色背景上更显眼 */
                stroke: transparent;
            }
        }

        /* 3. 激活波纹扩散 */
        @keyframes rippleEffect {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2.5);
                opacity: 0;
            }
        }

        /* 4. 文字浮现 */
        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 当动画完成，让 Logo 持续发光呼吸 */
        .logo-container.glowing .brand-logo {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3)); }
            50% { transform: translateY(-5px); filter: drop-shadow(0 0 25px rgba(0, 240, 255, 0.8)); } /* 增强呼吸发光效果 */
        }

    </style>
</head>

        </div>

        <div class="slogan-container">
            <div class="title">智能客服云平台</div>
            <div class="subtitle">AI驱动的客户服务与增长中台</div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const logoPath = document.querySelector('.logo-path');
            
            // 1. 动态获取 SVG Path 的真实长度，用于设置完美的描边动画参数
            const pathLength = logoPath.getTotalLength();
            logoPath.style.strokeDasharray = pathLength;
            logoPath.style.strokeDashoffset = pathLength;

            // 2. 动画时间轴控制
            setTimeout(() => {
                // 在 Logo 填充完毕后，添加持续发光的呼吸状态
                document.getElementById('logoContainer').classList.add('glowing');
            }, 2800);

            // 移除了淡出并跳转主应用的逻辑，让动画持续循环展示
        });
    </script>
</body>
</html>
