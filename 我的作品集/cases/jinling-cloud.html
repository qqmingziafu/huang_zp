<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金龄云管理后台B端 - 案例详情</title>
  <link rel="preload" as="image" href="../image/金龄云2.png" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #02060d;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      color: #f8fbff;
    }

    .case-page {
      width: 100%;
      min-height: 100vh;
      padding: 24px;
    }

    .back-link {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid rgba(25, 144, 255, 0.28);
      border-radius: 999px;
      background: rgba(2, 8, 18, 0.7);
      color: #f8fbff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 102, 255, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .case-section {
      max-width: 1920px;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid rgba(25, 144, 255, 0.16);
      border-radius: 28px;
      background: #000;
      box-shadow: 0 24px 90px rgba(0, 30, 82, 0.38);
    }

    .case-section + .case-section {
      margin-top: 24px;
    }

    .case-section img {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 768px) {
      .case-page {
        padding: 0;
      }

      .case-section {
        border-right: 0;
        border-left: 0;
        border-radius: 0;
      }

      .case-section + .case-section {
        margin-top: 0;
      }

      .back-link {
        top: 14px;
        left: 14px;
        padding: 8px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="case-page">
    <a class="back-link" href="../index.html#works">返回作品集</a>
    <section class="case-section" aria-label="金龄云管理后台B端案例板块 1">
      <img src="../image/金龄云2.png" alt="金龄云管理后台B端案例详情板块 1" />
    </section>
    <section class="case-section" aria-label="金龄云管理后台B端设计规范板块">
      <img src="../image/金龄云1.png" alt="金龄云管理后台B端设计规范" />
    </section>
    <section class="case-section" aria-label="金龄云管理后台B端页面展示板块 3">
      <img src="../image/金龄3.png" alt="金龄云管理后台B端页面展示板块 3" />
    </section>
    <section class="case-section" aria-label="金龄云管理后台B端页面展示板块 4">
      <img src="../image/金龄4.png" alt="金龄云管理后台B端页面展示板块 4" />
    </section>
    <section class="case-section" aria-label="金龄云管理后台B端页面展示板块 5">
      <img src="../image/金龄云5.png" alt="金龄云管理后台B端页面展示板块 5" />
    </section>
  </main>
</body>
</html>
