      border: 1px solid rgba(17, 17, 17, 0.08);
      border-radius: 28px;
      background: #fff;
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.12);
    }

    .case-section + .case-section {
      margin-top: 24px;
    }

    .case-section img {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 768px) {
      .case-page {
        padding: 0;
      }

      .case-section {
        border-right: 0;
        border-left: 0;
        border-radius: 0;
      }

      .case-section + .case-section {
        margin-top: 0;
      }

      .back-link {

        left: 14px;
        padding: 8px 12px;
