<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据可视化类别展示</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-full min-h-screen bg-gradient-to-br from-indigo-50/40 via-white to-blue-50/40 overflow-auto font-sans text-gray-700">

    <!-- 头部标题区 -->
    <header class="absolute top-8 left-10 z-20">
        <div class="flex items-center gap-2 mb-1">
            <div class="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
            <h1 class="text-lg font-medium text-blue-400">Data Visualization Category Presentation</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="flex">
                <div class="w-3 h-3 bg-blue-500 rounded-l-full"></div>
                <div class="w-3 h-3 bg-blue-300 rounded-r-full -ml-1"></div>
            </div>
            <h2 class="text-2xl font-bold tracking-wider">数据可视化类别展示</h2>
        </div>
    </header>
    <div class="absolute top-8 right-12 z-20 text-gray-400 font-light">2023</div>

    <!-- 缩放控制面板 -->
    <div class="fixed bottom-8 right-8 flex items-center gap-1 bg-white/90 backdrop-blur-sm px-3 py-1.5 rounded-full shadow-lg border border-blue-100 z-50">
        <button onclick="zoomOut()" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-blue-500 hover:bg-blue-50 rounded-full transition-colors text-xl leading-none cursor-pointer">-</button>
        <span id="scale-text" class="text-sm font-medium text-gray-600 w-12 text-center select-none">80%</span>
        <button onclick="zoomIn()" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-blue-500 hover:bg-blue-50 rounded-full transition-colors text-xl leading-none cursor-pointer">+</button>
        <div class="w-[1px] h-4 bg-gray-200 mx-1"></div>
        <button onclick="resetZoom()" class="text-xs text-gray-500 hover:text-blue-500 px-2 transition-colors cursor-pointer">重置</button>
    </div>

    <!-- 思维导图主容器 -->
    <div id="zoom-container" class="relative w-[1400px] h-[900px] mx-auto mt-20 transition-transform duration-300 origin-top" style="transform: scale(0.8)">
        
        <!-- 背景连线层 SVG -->
        <svg class="absolute inset-0 pointer-events-none" width="1400" height="900">
            <g stroke="#c7d2fe" stroke-width="1.5" fill="none">
                <!-- 中心到四极节点 -->
                <path d="M 700 425 L 700 370" /> <!-- Top -->
                <path d="M 700 475 L 700 530" /> <!-- Bottom -->
                <path d="M 640 450 L 520 450" /> <!-- Left -->
                <path d="M 760 450 L 880 450" /> <!-- Right -->

                <!-- 比较类 (Top) 分支网络 -->
                <path d="M 700 340 L 700 310" />
                <path d="M 490 310 L 910 310" /> <!-- 水平主干 -->
                <path d="M 490 310 L 490 280" />
                <path d="M 630 310 L 630 280" />
                <path d="M 770 310 L 770 280" />
                <path d="M 910 310 L 910 280" />

                <!-- 占比类 (Bottom) 分支网络 -->
                <path d="M 700 560 L 700 590" />
                <path d="M 490 590 L 910 590" /> <!-- 水平主干 -->
                <path d="M 490 590 L 490 620" />
                <path d="M 630 590 L 630 620" />
                <path d="M 770 590 L 770 620" />
                <path d="M 910 590 L 910 620" />

                <!-- 趋势类 (Left) 分支网络 -->
                <path d="M 440 450 L 380 450" />
                <path d="M 380 285 L 380 615" /> <!-- 垂直主干 -->
                <path d="M 380 285 L 320 285" />
                <path d="M 380 395 L 320 395" />
                <path d="M 380 505 L 320 505" />
                <path d="M 380 615 L 320 615" />

                <!-- 分布类 (Right) 分支网络 -->
                <path d="M 960 450 L 1020 450" />
                <path d="M 1020 285 L 1020 615" /> <!-- 垂直主干 -->
                <path d="M 1020 285 L 1080 285" />
                <path d="M 1020 395 L 1080 395" />
                <path d="M 1020 505 L 1080 505" />
                <path d="M 1020 615 L 1080 615" />
            </g>
        </svg>

        <!-- 中心核心节点 -->
        <div class="absolute w-[120px] h-[50px] border-[1.5px] border-blue-400 text-blue-500 bg-white/90 rounded-3xl flex items-center justify-center font-medium shadow-sm backdrop-blur-sm z-10" style="left: 640px; top: 425px;">
            图表类型
        </div>

        <!-- 四级分类胶囊节点 -->
        <div class="absolute w-[80px] h-[30px] bg-[#6395FA] text-white rounded-full flex items-center justify-center text-xs font-light shadow-md z-10" style="left: 660px; top: 340px;">比较类</div>
        <div class="absolute w-[80px] h-[30px] bg-[#6395FA] text-white rounded-full flex items-center justify-center text-xs font-light shadow-md z-10" style="left: 660px; top: 530px;">占比类</div>
        <div class="absolute w-[80px] h-[30px] bg-[#6395FA] text-white rounded-full flex items-center justify-center text-xs font-light shadow-md z-10" style="left: 440px; top: 435px;">趋势类</div>
        <div class="absolute w-[80px] h-[30px] bg-[#6395FA] text-white rounded-full flex items-center justify-center text-xs font-light shadow-md z-10" style="left: 880px; top: 435px;">分布类</div>

        <!-- 卡片动态渲染容器 -->
        <div id="cards-container"></div>
    </div>

    <!-- 图表卡片与交互逻辑脚本 -->
    <script>
        // --- 缩放控制逻辑 ---
        let currentScale = 0.8;
        const zoomContainer = document.getElementById('zoom-container');
        const scaleText = document.getElementById('scale-text');

        function updateScaleDisplay() {
            zoomContainer.style.transform = `scale(${currentScale})`;
            scaleText.innerText = `${Math.round(currentScale * 100)}%`;
        }

        function zoomIn() {
            currentScale = Math.min(2, currentScale + 0.1);
            updateScaleDisplay();
        }

        function zoomOut() {
            currentScale = Math.max(0.3, currentScale - 0.1);
            updateScaleDisplay();
        }

        function resetZoom() {
            currentScale = 0.8;
            updateScaleDisplay();
        }

        // --- 24种图表纯代码图标模板定义 ---
        const icons = {
            BasicBar: `<div class="flex items-end gap-1.5 h-10"><div class="w-2.5 h-6 bg-blue-400 rounded-t-sm"></div><div class="w-2.5 h-10 bg-blue-500 rounded-t-sm"></div><div class="w-2.5 h-7 bg-blue-300 rounded-t-sm"></div><div class="w-2.5 h-4 bg-blue-200 rounded-t-sm"></div></div>`,

            StackedBar: `<div class="flex items-end gap-1.5 h-10"><div class="w-2.5 h-8 flex flex-col justify-end gap-[1px]"><div class="w-full h-3 bg-blue-300 rounded-t-sm"></div><div class="w-full h-5 bg-blue-500"></div></div><div class="w-2.5 h-10 flex flex-col justify-end gap-[1px]"><div class="w-full h-4 bg-blue-300 rounded-t-sm"></div><div class="w-full h-6 bg-blue-500"></div></div><div class="w-2.5 h-6 flex flex-col justify-end gap-[1px]"><div class="w-full h-2 bg-blue-300 rounded-t-sm"></div><div class="w-full h-4 bg-blue-500"></div></div></div>`,

            HorizontalBar: `<div class="flex flex-col justify-center gap-1.5 w-10"><div class="h-2 w-full bg-blue-500 rounded-r-sm"></div><div class="h-2 w-2/3 bg-blue-400 rounded-r-sm"></div><div class="h-2 w-4/5 bg-blue-300 rounded-r-sm"></div></div>`,

            RadialBar: `<svg viewBox="0 0 100 100" class="w-10 h-10"><path d="M 50 10 A 40 40 0 1 1 10 50" fill="none" stroke="#60a5fa" stroke-width="8" stroke-linecap="round" /><path d="M 50 25 A 25 25 0 1 1 25 50" fill="none" stroke="#93c5fd" stroke-width="8" stroke-linecap="round" /><path d="M 50 40 A 10 10 0 0 1 60 50" fill="none" stroke="#bfdbfe" stroke-width="8" stroke-linecap="round" /></svg>`,

            Rose: `<svg viewBox="0 0 100 100" class="w-10 h-10"><path d="M50,50 L50,5 A45,45 0 0,1 95,50 Z" fill="#60a5fa" /><path d="M50,50 L95,50 A45,45 0 0,1 65,85 Z" fill="#93c5fd" /><path d="M50,50 L65,85 A45,45 0 0,1 25,75 Z" fill="#a78bfa" /><path d="M50,50 L25,75 A45,45 0 0,1 15,40 Z" fill="#cbd5e1" /><path d="M50,50 L15,40 A45,45 0 0,1 50,5 Z" fill="#bfdbfe" /><circle cx="50" cy="50" r="8" fill="white" /></svg>`,

            StackedArea: `<svg viewBox="0 0 100 50" class="w-12 h-8" preserveAspectRatio="none"><path d="M 0 50 L 0 20 Q 25 5 50 25 T 100 10 L 100 50 Z" fill="#93c5fd" opacity="0.8" /><path d="M 0 50 L 0 35 Q 30 20 60 40 T 100 30 L 100 50 Z" fill="#60a5fa" opacity="0.9" /></svg>`,

            Radar: `<svg viewBox="0 0 100 100" class="w-12 h-12"><polygon points="50,5 95,35 75,90 25,90 5,35" fill="none" stroke="#e2e8f0" stroke-width="1" /><polygon points="50,25 75,45 65,75 35,75 25,45" fill="none" stroke="#e2e8f0" stroke-width="1" /><line x1="50" y1="50" x2="50" y2="5" stroke="#e2e8f0" stroke-width="1" /><line x1="50" y1="50" x2="95" y2="35" stroke="#e2e8f0" stroke-width="1" /><line x1="50" y1="50" x2="75" y2="90" stroke="#e2e8f0" stroke-width="1" /><line x1="50" y1="50" x2="25" y2="90" stroke="#e2e8f0" stroke-width="1" /><line x1="50" y1="50" x2="5" y2="35" stroke="#e2e8f0" stroke-width="1" /><polygon points="50,20 80,45 60,65 40,80 15,40" fill="rgba(96, 165, 250, 0.4)" stroke="#60a5fa" stroke-width="2" /></svg>`,

            WordCloud: `<div class="relative w-full h-full"><span class="absolute top-2 left-2 text-[#60a5fa] text-[10px] font-bold">abandon</span><span class="absolute top-1 right-2 text-[#93c5fd] text-[8px]">OPPO</span><span class="absolute bottom-2 right-1 text-[#bfdbfe] text-[8px] transform -rotate-90">abandon</span><span class="absolute top-6 left-1 text-[#a78bfa] text-[8px]">abandon</span><span class="absolute bottom-3 left-6 text-[#94a3b8] text-[9px]">abandon</span></div>`,

            AreaChart: `<svg viewBox="0 0 100 50" class="w-12 h-8" preserveAspectRatio="none"><path d="M 0 50 L 0 30 Q 25 10 50 25 T 100 15 L 100 50 Z" fill="#dbeafe" /><path d="M 0 30 Q 25 10 50 25 T 100 15" fill="none" stroke="#60a5fa" stroke-width="2" /></svg>`,

            LineChart: `<svg viewBox="0 0 100 50" class="w-12 h-8" preserveAspectRatio="none"><polyline points="0,40 25,20 50,35 75,10 100,25" fill="none" stroke="#60a5fa" stroke-width="2" /><circle cx="25" cy="20" r="2" fill="white" stroke="#60a5fa" stroke-width="1" /><circle cx="50" cy="35" r="2" fill="white" stroke="#60a5fa" stroke-width="1" /><circle cx="75" cy="10" r="2" fill="white" stroke="#60a5fa" stroke-width="1" /></svg>`,

            Funnel: `<div class="flex flex-col items-center justify-center gap-[1px] w-full h-full mt-1"><div class="h-3 bg-blue-300 w-10" style="clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%)"></div><div class="h-3 bg-blue-400 w-7" style="clip-path: polygon(0 0, 100% 0, 80% 100%, 20% 100%)"></div><div class="h-4 bg-blue-500 w-4" style="clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%)"></div></div>`,

            BoxPlot: `<svg viewBox="0 0 100 50" class="w-10 h-10"><line x1="20" y1="10" x2="20" y2="40" stroke="#94a3b8" stroke-width="1" /><line x1="15" y1="10" x2="25" y2="10" stroke="#94a3b8" stroke-width="1" /><line x1="15" y1="40" x2="25" y2="40" stroke="#94a3b8" stroke-width="1" /><rect x="15" y="20" width="10" height="12" fill="#93c5fd" /><line x1="15" y1="26" x2="25" y2="26" stroke="#3b82f6" stroke-width="1.5" /><line x1="50" y1="5" x2="50" y2="35" stroke="#94a3b8" stroke-width="1" /><line x1="45" y1="5" x2="55" y2="5" stroke="#94a3b8" stroke-width="1" /><line x1="45" y1="35" x2="55" y2="35" stroke="#94a3b8" stroke-width="1" /><rect x="45" y="15" width="10" height="15" fill="#60a5fa" /><line x1="45" y1="22" x2="55" y2="22" stroke="#2563eb" stroke-width="1.5" /><line x1="80" y1="15" x2="80" y2="45" stroke="#94a3b8" stroke-width="1" /><line x1="75" y1="15" x2="85" y2="15" stroke="#94a3b8" stroke-width="1" /><line x1="75" y1="45" x2="85" y2="45" stroke="#94a3b8" stroke-width="1" /><rect x="75" y="25" width="10" height="10" fill="#93c5fd" /><line x1="75" y1="30" x2="85" y2="30" stroke="#3b82f6" stroke-width="1.5" /></svg>`,

            Histogram: `<div class="flex items-end h-8"><div class="w-3 h-4 bg-blue-300"></div><div class="w-3 h-7 bg-blue-400"></div><div class="w-3 h-8 bg-blue-500"></div><div class="w-3 h-5 bg-blue-300"></div><div class="w-3 h-3 bg-blue-200"></div></div>`,

            Bubble: `<div class="relative w-12 h-10"><div class="absolute top-1 left-1 w-4 h-4 bg-blue-300 rounded-full opacity-80"></div><div class="absolute top-3 left-4 w-6 h-6 bg-blue-400 rounded-full opacity-80"></div><div class="absolute top-0 right-1 w-3 h-3 bg-indigo-300 rounded-full opacity-80"></div><div class="absolute bottom-1 right-3 w-5 h-5 bg-blue-200 rounded-full opacity-80"></div></div>`,

            Scatter: `<div class="relative w-12 h-10"><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 10%; top: 20%"></div><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 25%; top: 30%"></div><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 15%; top: 45%"></div><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 40%; top: 25%"></div><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 55%; top: 35%"></div><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 70%; top: 40%"></div><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 60%; top: 60%"></div><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 80%; top: 50%"></div><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 90%; top: 70%"></div><div class="absolute w-1 h-1 bg-blue-500 rounded-full" style="left: 85%; top: 30%"></div></div>`,

            Donut: `<div class="w-10 h-10 rounded-full border-[6px] border-blue-500 border-r-green-400 border-t-blue-300"></div>`,

            Pie: `<div class="w-10 h-10 rounded-full" style="background: conic-gradient(#34d399 0 30%, #60a5fa 30% 75%, #fcd34d 75% 100%)"></div>`,

            Gauge: `<div class="flex flex-col items-center"><svg viewBox="0 0 100 50" class="w-14 h-7"><path d="M 10 45 A 40 40 0 0 1 90 45" fill="none" stroke="#e2e8f0" stroke-width="12" stroke-linecap="round" /><path d="M 10 45 A 40 40 0 0 1 70 15" fill="none" stroke="#60a5fa" stroke-width="12" stroke-linecap="round" /></svg><div class="text-[10px] font-bold text-gray-700 mt-1">87%</div><div class="text-[8px] text-gray-400">加载进度</div></div>`,

            PercentageArea: `<div class="relative w-14 h-8 bg-blue-100 overflow-hidden text-[6px] text-white"><div class="absolute bottom-0 w-full h-[70%] bg-blue-200 flex items-center justify-center pt-2"><div class="absolute top-0 w-full h-full bg-blue-300" style="clip-path: polygon(0 15%, 100% 0, 100% 100%, 0 100%)"><span class="absolute bottom-1 left-2">15%</span></div><div class="absolute top-0 w-full h-[60%] bg-blue-500" style="clip-path: polygon(0 30%, 100% 10%, 100% 100%, 0 100%)"><span class="absolute bottom-1 right-2">70%</span></div></div></div>`,

            Liquid: `<div class="w-10 h-10 rounded-full border border-blue-400 overflow-hidden relative"><div class="absolute bottom-0 w-full h-1/2 bg-blue-100"></div><svg viewBox="0 0 100 50" class="absolute top-[35%] left-0 w-full h-[30%]" preserveAspectRatio="none"><path d="M0,25 Q25,0 50,25 T100,25 L100,50 L0,50 Z" fill="#93c5fd" /></svg><div class="absolute bottom-0 w-full h-[40%] bg-[#93c5fd]"></div></div>`,

            ProgressBar: `<div class="w-14 h-2 bg-blue-200 rounded-sm overflow-hidden flex"><div class="w-[60%] h-full bg-blue-500"></div></div>`,

            PercentageStackedBar: `<div class="flex items-end gap-1.5 h-10"><div class="w-2.5 h-10 flex flex-col gap-[1px]"><div class="w-full h-[30%] bg-blue-200 rounded-t-sm"></div><div class="w-full h-[70%] bg-blue-500 rounded-b-sm flex items-center justify-center text-[5px] text-white">80%</div></div><div class="w-2.5 h-10 flex flex-col gap-[1px]"><div class="w-full h-[50%] bg-blue-200 rounded-t-sm"></div><div class="w-full h-[50%] bg-blue-500 rounded-b-sm flex items-center justify-center text-[5px] text-white">50%</div></div><div class="w-2.5 h-10 flex flex-col gap-[1px]"><div class="w-full h-[70%] bg-blue-200 rounded-t-sm flex items-center justify-center text-[5px] text-blue-600">20%</div><div class="w-full h-[30%] bg-blue-500 rounded-b-sm"></div></div></div>`
        };

        // 卡片数据配置工具
        const generateCards = (keys, startX, startY, cols = 4) => {
            return keys.map((item, idx) => {
                const col = idx % cols;
                const row = Math.floor(idx / cols);
                return {
                    title: item.title,
                    icon: icons[item.key],
                    x: startX + col * 140, // width 120 + gap 20
                    y: startY + row * 110  // height 90 + gap 20
                };
            });
        };

        // 数据归类坐标分配
        const comparisonKeys = [
            { key: 'BasicBar', title: '基础柱状图' }, { key: 'StackedBar', title: '堆叠柱状图' },
            { key: 'HorizontalBar', title: '条形图' }, { key: 'RadialBar', title: '玉玦图' },
            { key: 'Rose', title: '玫瑰图' }, { key: 'StackedArea', title: '堆叠面积图' },
            { key: 'Radar', title: '雷达图' }, { key: 'WordCloud', title: '词云图' }
        ];

        const proportionKeys = [
            { key: 'Donut', title: '环图' }, { key: 'Pie', title: '饼状图' },
            { key: 'Gauge', title: '仪表盘' }, { key: 'PercentageArea', title: '百分比堆叠面积图' },
            { key: 'Liquid', title: '水波图' }, { key: 'ProgressBar', title: '条状图' },
            { key: 'StackedBar', title: '堆叠柱状图' }, { key: 'PercentageStackedBar', title: '百分比堆叠柱状图' }
        ];

        const trendKeys = [
            { key: 'AreaChart', title: '面积图' }, { key: 'LineChart', title: '折线图' },
            { key: 'StackedArea', title: '堆叠面积图' }, { key: 'Funnel', title: '漏斗图' }
        ];

        const distributionKeys = [
            { key: 'BoxPlot', title: '盒须图' }, { key: 'Histogram', title: '直方图' },
            { key: 'Bubble', title: '气泡图' }, { key: 'Scatter', title: '散点图' }
        ];

        // 组装所有卡片
        const allCards = [
            ...generateCards(comparisonKeys, 430, 80, 4),      // Top
            ...generateCards(proportionKeys, 430, 620, 4),     // Bottom
            ...generateCards(trendKeys, 200, 240, 1),          // Left
            ...generateCards(distributionKeys, 1080, 240, 1)   // Right
        ];

        // 注入到页面容器
        const container = document.getElementById('cards-container');
        let cardsHtml = '';
        allCards.forEach(card => {
            cardsHtml += `
                <div class="absolute w-[120px] h-[90px] bg-white border border-blue-100 rounded-lg shadow-[0_2px_10px_rgba(0,0,0,0.03)] flex flex-col items-center justify-between p-2 pb-3 transition-transform hover:-translate-y-1 hover:shadow-md cursor-pointer" style="left: ${card.x}px; top: ${card.y}px;">
                    <div class="flex-1 w-full flex items-center justify-center">
                        ${card.icon}
                    </div>
                    <span class="text-[11px] text-gray-500 whitespace-nowrap mt-1">${card.title}</span>
                </div>
            `;
        });
        container.innerHTML = cardsHtml;
    </script>
</body>
</html>
