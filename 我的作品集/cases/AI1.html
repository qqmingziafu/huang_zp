    <!-- 激活 Lucide 图标 -->
    <script>
        lucide.createIcons();

        const backLink = document.getElementById('backLink');
        if (backLink) {
            backLink.addEventListener('click', (event) => {
                if (window.history.length <= 1) return;
                event.preventDefault();
                window.history.back();
            });
        }

        function resizeCaseFrame(frame) {
            try {
                const doc = frame.contentDocument || frame.contentWindow.document;
                const height = Math.max(
                    doc.body.scrollHeight,
                    doc.documentElement.scrollHeight
                );
                frame.style.height = height + 'px';
            } catch (error) {
                // Keep the fixed fallback height if the browser blocks frame measurement.
            }
        }

        document.querySelectorAll('.case-section-frame').forEach((frame) => {
            frame.addEventListener('load', () => resizeCaseFrame(frame));
        });
    </script>
