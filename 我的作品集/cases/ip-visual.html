<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>网上老年大学品牌视觉指导手册 - 案例详情</title>
  <link rel="preload" as="image" href="../image/LOGO1.jpg" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f6f1ea;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      color: #2a1a12;
    }

    .case-page {
      width: 100%;
      min-height: 100vh;
      padding: 24px;
    }

    .back-link {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid rgba(230, 106, 64, 0.22);
      border-radius: 999px;
      background: rgba(255, 250, 244, 0.72);
      color: #2a1a12;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(126, 69, 37, 0.14);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .case-section {
      max-width: 1920px;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid rgba(126, 69, 37, 0.12);
      border-radius: 28px;
      background: #fffaf4;
      box-shadow: 0 24px 90px rgba(126, 69, 37, 0.16);
    }

    .case-section img {
      display: block;
      width: 100%;
      height: auto;
    }

    .case-section + .case-section {
      margin-top: 24px;
    }

    @media (max-width: 768px) {
      .case-page {
        padding: 0;
      }

      .case-section {
        border-right: 0;
        border-left: 0;
        border-radius: 0;
      }

      .case-section + .case-section {
        margin-top: 0;
      }

      .back-link {
        top: 14px;
        left: 14px;
        padding: 8px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="case-page">
    <a class="back-link" href="../index.html#aigc" data-back-link>返回上一级</a>
    <section class="case-section" aria-label="网上老年大学品牌视觉指导手册案例板块 1">
      <img src="../image/LOGO1.jpg" alt="网上老年大学品牌视觉指导手册板块 1" />
    </section>
    <section class="case-section" aria-label="网上老年大学品牌视觉指导手册案例板块 2">
      <img src="../image/LOGO2.jpg" alt="网上老年大学品牌视觉指导手册板块 2" />
    </section>
    <section class="case-section" aria-label="网上老年大学品牌视觉指导手册案例板块 3">
      <img src="../image/LOGO3.jpg" alt="网上老年大学品牌视觉指导手册板块 3" />
    </section>
    <section class="case-section" aria-label="网上老年大学品牌视觉指导手册案例板块 4">
      <img src="../image/LOGO4.jpg" alt="网上老年大学品牌视觉指导手册板块 4" />
    </section>
    <section class="case-section" aria-label="网上老年大学品牌视觉指导手册案例板块 5">
      <img src="../image/LOGO5.jpg" alt="网上老年大学品牌视觉指导手册板块 5" />
    </section>
    <section class="case-section" aria-label="网上老年大学品牌视觉指导手册案例板块 6">
      <img src="../image/LOGO6.jpg" alt="网上老年大学品牌视觉指导手册板块 6" />
    </section>
    <section class="case-section" aria-label="网上老年大学品牌视觉指导手册案例板块 7">
      <img src="../image/LOGO7.jpg" alt="网上老年大学品牌视觉指导手册板块 7" />
    </section>
    <section class="case-section" aria-label="网上老年大学品牌视觉指导手册案例板块 8">
      <img src="../image/LOGO8.jpg" alt="网上老年大学品牌视觉指导手册板块 8" />
    </section>
    <section class="case-section" aria-label="网上老年大学品牌视觉指导手册案例板块 9">
      <img src="../image/LOGO9.jpg" alt="网上老年大学品牌视觉指导手册板块 9" />
    </section>
  </main>
  <script>
    document.querySelector('[data-back-link]').addEventListener('click', event => {
      if (window.history.length > 1) {
        event.preventDefault();
        window.history.back();
      }
    });
  </script>
</body>
</html>
