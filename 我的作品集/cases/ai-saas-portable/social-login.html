<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第三方授权登录</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #1f2937;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        background:
          radial-gradient(circle at 20% 10%, rgba(50, 196, 255, 0.2), transparent 28%),
          radial-gradient(circle at 80% 18%, rgba(40, 103, 255, 0.16), transparent 28%),
          linear-gradient(135deg, #f8fcff 0%, #eaf5ff 100%);
      }

      .auth-card {
        width: min(100%, 420px);
        padding: 42px 36px 34px;
        border: 1px solid rgba(255, 255, 255, 0.86);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 28px 72px rgba(40, 103, 255, 0.14);
        backdrop-filter: blur(22px);
        text-align: center;
      }

      .provider-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 22px;
        display: grid;
        place-items: center;
        border-radius: 22px;
        color: #fff;
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(135deg, #2867ff, #32c4ff);
        box-shadow: 0 16px 34px rgba(40, 103, 255, 0.22);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #64748b;
        line-height: 1.8;
      }

      .qr {
        width: 178px;
        height: 178px;
        margin: 28px auto 22px;
        padding: 14px;
        border-radius: 18px;
        background:
          linear-gradient(90deg, #111827 10px, transparent 10px) 0 0 / 28px 28px,
          linear-gradient(#111827 10px, transparent 10px) 0 0 / 28px 28px,
          #fff;
        border: 10px solid #fff;
        box-shadow: inset 0 0 0 1px #dbeafe, 0 12px 28px rgba(40, 103, 255, 0.1);
      }

      .actions {
        display: grid;
        gap: 12px;
      }

      button,
      a {
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
      }

      button {
        border: 0;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, #2867ff, #32c4ff);
        box-shadow: 0 16px 30px rgba(40, 103, 255, 0.22);
      }

      a {
        color: #51617f;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(216, 231, 248, 0.92);
      }
    </style>
  </head>
  <body>
    <main class="auth-card">
      <div class="provider-icon" id="provider-icon">微</div>
      <h1 id="provider-title">微信登录</h1>
      <p id="provider-copy">请使用微信扫码完成授权登录。</p>
      <div class="qr" aria-label="模拟授权二维码"></div>
      <div class="actions">
        <button type="button" id="confirm-auth">确认授权登录</button>
        <a href="./index.html">返回账号登录</a>
      </div>
    </main>

    <script>
      const providers = {
        wechat: { title: "微信登录", copy: "请使用微信扫码完成授权登录。", icon: "微", auth: "wechat" },
        dingtalk: { title: "钉钉登录", copy: "请使用钉钉扫码或确认授权登录。", icon: "钉", auth: "dingtalk" },
        wecom: { title: "企业微信登录", copy: "请使用企业微信扫码完成授权登录。", icon: "企", auth: "wecom" },
      };

      const params = new URLSearchParams(window.location.search);
      const provider = providers[params.get("provider")] || providers.wechat;
      document.querySelector("#provider-title").textContent = provider.title;
      document.querySelector("#provider-copy").textContent = provider.copy;
      document.querySelector("#provider-icon").textContent = provider.icon;
      document.querySelector("#confirm-auth").addEventListener("click", () => {
        window.location.href = `./index.html?auth=${provider.auth}`;
      });
    </script>
  </body>
</html>
