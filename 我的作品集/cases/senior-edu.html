  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f7f2ef;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      color: #17212d;
    }

    .case-page {
      width: 100%;
      min-height: 100vh;
      padding: 24px;
    }

    .back-link {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: #17212d;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(230, 106, 64, 0.14);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .case-section {
      max-width: 1920px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 28px;
      background: #fff;
      box-shadow: 0 24px 80px rgba(117, 64, 36, 0.1);
    }

    .case-section img,
    .case-section video {
      display: block;
      width: 100%;
      height: auto;
    }

    .case-section video.case-video {
      height: auto;
      background: #fff;
    }

    .hero-carousel {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #fff url("../image/APP1-1.png") center / cover no-repeat;
      isolation: isolate;
    }

    .hero-carousel img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      animation: hero-slide 12s infinite;
      animation-fill-mode: none;
      backface-visibility: hidden;
      transform: translateZ(0);
      will-change: opacity;
    }

    .hero-carousel img:nth-child(1) {
      opacity: 1;
      animation-delay: 0s;
    }

    .hero-carousel img:nth-child(2) {
      animation-delay: 3s;
    }

    .hero-carousel img:nth-child(3) {
      animation-delay: 6s;
    }

    .hero-carousel img:nth-child(4) {
      animation-delay: 9s;
    }

    @keyframes hero-slide {
      0%,
      23% {
        opacity: 1;
      }

      28%,
      100% {
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-carousel img {
        animation: none;
      }

      .hero-carousel img:not(:first-child) {
        display: none;
      }
    }

    .app-image-section {
      margin-top: 24px;
    }

    .html-section {
      margin-top: 24px;
      overflow: hidden;
      border-radius: 28px;
      background: #fafafc;
      box-shadow: 0 24px 80px rgba(117, 64, 36, 0.08);
    }

    .html-section iframe {
      display: block;
      width: 100%;
      height: var(--section-height, 100vh);
      min-height: 900px;
      border: 0;
      background: #fafafc;
    }

    @media (max-width: 768px) {
      .case-page {
        padding: 0;
      }

      .case-section {
        border-radius: 0;
      }

      .app-image-section {
        margin-top: 0;
      }

      .html-section {
        margin-top: 0;
        border-radius: 0;
      }

      .html-section iframe {
        min-height: 1180px;
      }

      .back-link {
        top: 14px;
        left: 14px;
        padding: 8px 12px;
        font-size: 13px;
      }
    }
  </style>
