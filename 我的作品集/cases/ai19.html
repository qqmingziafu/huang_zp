<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计验证 - 用户体验提升明显</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            height: calc(100vw * 2495 / 4214 - 46px);
        }

        .image-crop {
            position: relative;
            overflow: hidden;
            height: 100%;
        }

        img {
            display: block;
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="image-crop">
        <img src="../image/Frame 3.png" alt="设计验证 - 用户体验提升明显">
    </div>
</body>
</html>
